<svg width="250" height="120" viewBox="0 0 280 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <!-- Hexagon (unverändert, dark style bleibt) -->
  <polygon points="70,20 115,45 115,95 70,120 25,95 25,45"
           fill="#0F172A"
           stroke="url(#grad)"
           stroke-width="3"/>

  <!-- Terminal Window -->
  <rect x="42" y="50" width="56" height="35" rx="6"
        fill="#020617"
        stroke="#22C55E"
        stroke-width="1.5"/>

  <!-- Header Dots -->
  <circle cx="48" cy="56" r="2" fill="#ef4444"/>
  <circle cx="54" cy="56" r="2" fill="#f59e0b"/>
  <circle cx="60" cy="56" r="2" fill="#22c55e"/>

  <!-- Prompt -->
  <text x="50" y="75"
        font-family="JetBrains Mono, monospace"
        font-size="14"
        fill="#22C55E"
        font-weight="600">
    >_
  </text>

  <!-- Network Lines -->
  <line x1="115" y1="45" x2="150" y2="30" stroke="#38BDF8" stroke-width="2"/>
  <line x1="115" y1="95" x2="150" y2="110" stroke="#38BDF8" stroke-width="2"/>
  <circle cx="150" cy="30" r="3" fill="#38BDF8"/>
  <circle cx="150" cy="110" r="3" fill="#38BDF8"/>

  <!-- Text (angepasst für weißen Hintergrund) -->
  <text x="170" y="65"
        font-family="Inter, sans-serif"
        font-size="22"
        fill="#0F172A"
        font-weight="600"
        letter-spacing="0.5">
    PVE VDI
  </text>

  <text x="170" y="95"
        font-family="Inter, sans-serif"
        font-size="16"
        fill="#475569">
    Manager
  </text>
</svg>